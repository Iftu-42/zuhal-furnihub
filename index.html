<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuhal FurniHub | Premium Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Zuhal FurniHub</div>
        
        <div class="nav-links">
            <a href="sell.html" class="sell-btn-nav">+ Sell Furniture</a>
        </div>

        <div class="nav-icons">
            <button id="dark-mode-toggle" class="mode-btn">🌙</button>
            <span class="icon-spacing">🛒</span>
            <span class="icon-spacing">🔔</span>
            <div class="profile-circle"></div>
        </div>
    </nav>

    <header class="hero">
        <h1>Find your next <span class="highlight">comfort.</span></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search sofas, tables, decor..." onkeyup="searchFurniture()">
            <button class="search-btn">🔍</button>
        </div>
    </header>

    <section class="filter-section">
        <div class="style-discovery">
            <button class="chip active" onclick="filterByStyle('All')">All</button>
            <button class="chip" onclick="filterByStyle('Modern')">Modern</button>
            <button class="chip" onclick="filterByStyle('Ethiopian Traditional')">Ethiopian Traditional</button>
            <button class="chip" onclick="filterByStyle('Scandinavian')">Scandinavian</button>
        </div>
        
        <div class="secondary-filters">
            <select id="roomSize" onchange="filterBySize()">
                <option value="all">Any Room Size</option>
                <option value="small">Small (Studio/Apartment)</option>
                <option value="large">Large (Villa)</option>
            </select>
        </div>
    </section>

    <main class="product-grid" id="productGrid">
        </main>

    <section class="tools-container">
        <div class="delivery-calc">
            <h3>🚚 Estimate Delivery Cost</h3>
            <div class="calc-box">
                <label>Pickup Area:</label>
                <select id="pickup">
                    <option value="0">Addis Ketema (Merkato)</option>
                    <option value="150">Bole</option>
                    <option value="200">CMC / Ayat</option>
                    <option value="100">Piassa</option>
                </select>

                <label>Item Size:</label>
                <select id="itemSize">
                    <option value="1">Small (Chair/Lamp)</option>
                    <option value="2.5">Medium (Dining Table)</option>
                    <option value="5">Large (3-Seater Sofa / Bed)</option>
                </select>
                
                <button class="request-btn" onclick="calculateDelivery()">Check Price</button>
                <p id="deliveryResult"></p>
            </div>
        </div>

        <div class="custom-request">
            <h2>Can't find what you need?</h2>
            <p>Request a custom piece from local Addis carpenters.</p>
            <div class="request-form">
                <input type="text" id="customItemName" placeholder="e.g., Rosewood Office Desk">
                <textarea id="customDescription" placeholder="Describe the dimensions and style..."></textarea>
                <div class="upload-box">
                    <label for="file-upload">📸 Upload Reference Image</label>
                    <input id="file-upload" type="file" />
                </div>
                <button class="request-btn" onclick="submitRequest()">Send to Local Carpenters</button>
            </div>
        </div>
    </section>

    <footer style="text-align: center; padding: 40px; opacity: 0.6; font-size: 0.8rem;">
        &copy; 2026 Zuhal FurniHub | Addis Ababa, Ethiopia
    </footer>

    <script src="script.js"></script>
</body>
</html>
