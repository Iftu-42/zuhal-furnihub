<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell on Zuhal FurniHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:white; text-decoration:none;">Zuhal FurniHub</a></div>
        <div class="nav-links">
            <a href="index.html" style="color:white; text-decoration:none;">← Back to Shop</a>
            <button id="dark-mode-toggle" class="mode-btn">🌙</button>
        </div>
    </nav>

    <section class="form-container" style="max-width: 600px; margin: 50px auto; padding: 20px;">
        <h2 style="text-align: center; color: var(--zuhal-green);">List Your Furniture</h2>
        <p style="text-align: center; opacity: 0.8; margin-bottom: 30px;">Reach thousands of buyers in Addis Ababa instantly.</p>

        <div class="sell-card" style="background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            
            <label style="display: block; margin-bottom: 8px; font-weight: 600;">📸 Upload Item Photo</label>
            <input type="file" id="itemImageInput" accept="image/*" class="file-input" style="margin-bottom: 20px;">

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Item Name</label>
            <input type="text" id="itemName" placeholder="e.g. Vintage Leather Armchair" style="width: 100%; box-sizing: border-box;">

            <label style="display: block; margin-top: 15px; margin-bottom: 8px; font-weight: 600;">Price (ETB)</label>
            <input type="number" id="itemPrice" oninput="updateEarnings()" placeholder="0.00" style="width: 100%; box-sizing: border-box;">
            
            <div class="earnings-breakdown" style="background: var(--zuhal-cream); padding: 15px; border-radius: 10px; margin: 15px 0;">
                <p style="margin: 5px 0; font-size: 0.9rem;">Zuhal Service Fee (10%): <span id="feeAmount">0</span> ETB</p>
                <p style="margin: 5px 0; color: var(--zuhal-green);"><strong>You will receive: <span id="finalEarning">0</span> ETB</strong></p>
            </div>

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Furniture Style</label>
            <select id="itemStyle" style="width: 100%; margin-bottom: 15px;">
                <option value="Modern">Modern</option>
                <option value="Scandinavian">Scandinavian</option>
                <option value="Ethiopian Traditional">Ethiopian Traditional</option>
                <option value="Minimalist">Minimalist</option>
            </select>

            <label style="display: block; margin-bottom: 8px; font-weight: 600;">Item Size</label>
            <select id="itemSize" style="width: 100%; margin-bottom: 20px;">
                <option value="small">Small (Chair, Lamp, Nightstand)</option>
                <option value="medium">Medium (Table, Bookshelf)</option>
                <option value="large">Large (Sofa, Bed, Wardrobe)</option>
            </select>

            <label class="premium-option" style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 25px;">
                <input type="checkbox" id="isPremium"> 
                <span style="font-size: 0.9rem;">✨ Feature as <strong>Premium Listing</strong> (Increases visibility)</span>
            </label>

            <button class="request-btn" onclick="postAd()" style="width: 100%; padding: 15px; background: var(--zuhal-green); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1.1rem;">
                🚀 Post My Ad
            </button>
        </div>
    </section>

    <footer style="text-align: center; padding: 20px; font-size: 0.8rem; opacity: 0.5;">
        By posting, you agree to Zuhal's Terms of Service.
    </footer>

    <script src="script.js"></script>
</body>
</html>
