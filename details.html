<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details | Zuhal FurniHub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:white; text-decoration:none;">Zuhal FurniHub</a></div>
        <div class="nav-links">
            <a href="index.html" style="color:white; text-decoration:none;">← Back to Shop</a>
            <button id="dark-mode-toggle" class="mode-btn">🌙</button>
        </div>
    </nav>

    <main class="details-container" id="detailsView">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
            <p>Loading furniture details...</p>
        </div>
    </main>

    <section class="related-section">
        <hr style="opacity: 0.1; margin: 40px 0;">
        <h2 style="text-align: center; margin-bottom: 30px; color: var(--zuhal-green);">You May Also Like</h2>
        
        <div class="product-grid" id="relatedGrid"></div>
    </section>

    <footer style="text-align: center; padding: 40px; opacity: 0.6; font-size: 0.8rem;">
        &copy; 2026 Zuhal FurniHub | Secure Furniture Marketplace
    </footer>

    <script src="script.js"></script>
</body>
</html>
